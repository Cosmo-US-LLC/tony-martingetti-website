name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Link Vercel project
        run: |
          mkdir -p .vercel
          printf '{"projectId":"%s","orgId":"%s"}' \
            "$VERCEL_PROJECT_ID" "$VERCEL_ORG_ID" > .vercel/project.json
          echo "=== .vercel/project.json ==="
          cat .vercel/project.json
          echo ""
          echo "=== Secret check (lengths, not values) ==="
          echo "TOKEN length: ${#VERCEL_TOKEN}"
          echo "PROJECT_ID length: ${#VERCEL_PROJECT_ID}"
          echo "ORG_ID length: ${#VERCEL_ORG_ID}"
        env:
          VERCEL_TOKEN: ${{ secrets.PLANNEDGIVINGACCERLATED_VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.PLANNEDGIVINGACCERLATED_VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.PLANNEDGIVINGACCERLATED_VERCEL_ORG_ID }}

      - name: Build project
        run: npm run build

      - name: Prepare Vercel output structure
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/. .vercel/output/static/
          echo '{"version":3}' > .vercel/output/config.json

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.PLANNEDGIVINGACCERLATED_VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.PLANNEDGIVINGACCERLATED_VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.PLANNEDGIVINGACCERLATED_VERCEL_PROJECT_ID }}
