name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify token access
        run: |
          echo "=== Vercel user ==="
          curl -s -H "Authorization: Bearer $TOKEN" https://api.vercel.com/v2/user | python3 -c "import sys,json; d=json.load(sys.stdin); print('User:', d.get('user',{}).get('email','unknown'))"
          echo "=== Project access (with teamId) ==="
          curl -s -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v9/projects/$PROJECT_ID?teamId=$ORG_ID" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Result:', d.get('name', d.get('error',{}).get('message','unknown')))"
          echo "=== Project access (without teamId - personal) ==="
          curl -s -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v9/projects/$PROJECT_ID" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Result:', d.get('name', d.get('error',{}).get('message','unknown')))"
          echo "=== List team projects ==="
          curl -s -H "Authorization: Bearer $TOKEN" "https://api.vercel.com/v9/projects?teamId=$ORG_ID" | python3 -c "import sys,json; d=json.load(sys.stdin); [print('-', p['name'], p['id']) for p in d.get('projects',[])]"
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN_PLANNEDGIVINGACCERLATED_2 }}
          PROJECT_ID: ${{ secrets.PLANNEDGIVINGACCERLATED_VERCEL_PROJECT_ID }}
          ORG_ID: ${{ secrets.PLANNEDGIVINGACCERLATED_VERCEL_ORG_ID }}

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN_PLANNEDGIVINGACCERLATED_2 }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.PLANNEDGIVINGACCERLATED_VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.PLANNEDGIVINGACCERLATED_VERCEL_PROJECT_ID }}
