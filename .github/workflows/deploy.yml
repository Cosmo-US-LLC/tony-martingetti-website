name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.PLANNEDGIVINGACCERLATED_VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.PLANNEDGIVINGACCERLATED_VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Build project
        run: npm run build

      - name: Prepare Vercel output structure
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/. .vercel/output/static/
          printf '{"version":3}' > .vercel/output/config.json
          printf '{"projectId":"%s","orgId":"%s"}' \
            "$VERCEL_PROJECT_ID" "$VERCEL_ORG_ID" > .vercel/project.json

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN_PLANNEDGIVINGACCERLATED }} --debug
